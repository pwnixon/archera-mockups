<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Archera — Social Proof Variants</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0C0A30; --ink-2:#15123F; --deep:#0A0726;
    --violet:#7101FF; --violet-2:#8B01E8; --violet-soft:#F6F0FF;
    --sky:#6DD8FC; --sky-soft:#EAF9FE;
    --peach:#F89090; --peach-soft:#FDE7E7;
    --mint:#38D9BF; --mint-2:#20A795;
    --amber:#FFD080; --amber-soft:#FFF6E5;
    --navy:#464867; --periwinkle:#A2B1FB; --crimson:#AD284B;
    --slate-3:#444444; --slate-4:#686870; --slate-5:#9D9DA2;
    --line:#E2E2E5; --line-2:#F1F5F9;
    --paper:#F6F5F4; --paper-warm:#FDFCFB;
    --ff-d:"Manrope",system-ui,sans-serif;
    --ff-b:"Lexend",system-ui,sans-serif;
    --radius-sm:10px; --radius:16px; --radius-lg:24px; --radius-xl:36px;
    --shadow-md: 0 12px 32px -12px rgba(12,10,48,0.18);
    --shadow-lg: 0 28px 60px -20px rgba(12,10,48,0.25);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:#EDECEA;color:var(--ink);font-family:var(--ff-b)}
  .page-wrap{padding:24px 24px 80px;display:flex;flex-direction:column;gap:24px}
  .variant-shell{border-radius:28px;overflow:hidden;box-shadow:0 40px 80px -40px rgba(12,10,48,0.2),0 2px 0 rgba(12,10,48,0.04);position:relative;min-height:200px}
  .variant-tag{position:absolute;top:28px;left:28px;z-index:100;display:inline-flex;align-items:center;gap:10px;padding:8px 14px 8px 8px;background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);border:1px solid rgba(12,10,48,0.08);border-radius:999px;font-family:var(--ff-d);font-size:13px;font-weight:600;color:var(--ink);box-shadow:0 4px 14px -6px rgba(12,10,48,0.08)}
  .variant-tag .dot{width:24px;height:24px;border-radius:50%;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700}
  h1,h2,h3,h4{font-family:var(--ff-d);font-weight:700;letter-spacing:-0.02em;margin:0;color:var(--ink);line-height:1.05}
  p{margin:0}

  /* Shared tokens used across variants */
  .kicker{
    font-family:var(--ff-d);font-weight:700;font-size:13px;letter-spacing:0.14em;
    text-transform:uppercase;color:var(--violet);display:inline-block;
  }

  /* Testimonial card hover — Variant A */
  .tc-card { cursor: default; }
  .tc-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px -12px rgba(12,10,48,0.18);
    border-color: var(--line) !important;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="testimonials-shared.jsx"></script>
<script type="text/babel" src="testimonials-variants.jsx"></script>
<script type="text/babel">
function App(){
  const variants = [
    {id:'A', label:'Equal cards — all visible', el:<VariantA/>},
    {id:'B', label:'Carousel — one at a time', h:1600, el:<VariantB/>},
    {id:'C', label:'Tabbed triptych', h:1500, el:<VariantC/>},
    {id:'D', label:'Tabbed triptych — dark', h:1500, el:<VariantD/>},
    {id:'E', label:'Pillar cards — practitioners C style', el:<VariantE/>},
  ];
  return (
    <div className="page-wrap">
      {variants.map(v=>(
        <div key={v.id} className="variant-shell" style={v.h ? {height:v.h} : {}}>
          <div className="variant-tag"><span className="dot">{v.id}</span>{v.label}</div>
          <div style={{width:'100%',height:'100%'}}>{v.el}</div>
        </div>
      ))}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
