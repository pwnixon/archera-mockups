<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Archera — Metrics Section Variants</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
:root {
  --ink:#0C0A30;
  --violet:#7101FF; --violet-2:#8B01E8;
  --sky:#6DD8FC; --peach:#F89090; --mint:#38D9BF; --mint-2:#20A795;
  --amber:#FFD080; --periwinkle:#A2B1FB; --crimson:#AD284B;
  --slate-3:#444444; --slate-4:#686870; --slate-5:#9D9DA2;
  --line:#E2E2E5; --line-2:#F1F5F9;
  --paper:#F6F5F4; --paper-warm:#FDFCFB;
  --ff-d:"Manrope",system-ui,sans-serif;
  --ff-b:"Lexend",system-ui,sans-serif;
  --radius:16px; --radius-lg:24px; --radius-xl:32px;
  --shadow-lg:0 32px 80px -24px rgba(12,10,48,0.28);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--ff-b);font-size:16px;line-height:1.6;color:var(--ink);background:#e8e8e8;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:var(--ff-d);font-weight:700;letter-spacing:-0.02em;margin:0;line-height:1.1;}
p{margin:0;}
.variant-label{font-family:var(--ff-d);font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#888;text-align:center;padding:48px 0 0;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;

function useBreakpoint(){
  const[w,setW]=useState(window.innerWidth);
  useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);
  return{isSm:w<640,isMd:w>=640&&w<1024,isLg:w>=1024};
}

const STATS=[
  {n:'$4B',   sub:'/yr',  eyebrow:'Under Management', body:'in cloud commitments across AWS, Azure & Google Cloud', accent:'var(--sky)',     accentHex:'#6DD8FC'},
  {n:'$0',    sub:'',     eyebrow:'Platform Fee',      body:'flat pricing, forever — we never take a cut of your savings', accent:'var(--mint)', accentHex:'#38D9BF'},
  {n:'SOC 2', sub:'II',   eyebrow:'Certified',         body:'& ISO 27001:2022 — independently audited', accent:'var(--amber)',  accentHex:'#FFD080'},
  {n:'30',    sub:'-day', eyebrow:'Minimum Term',      body:'minimum commitment — no multi-year lock-in required', accent:'var(--peach)',  accentHex:'#F89090'},
  {n:'20–30', sub:'%',    eyebrow:'Cost Reduction',    body:'typical cloud cost reduction for Archera customers', accent:'var(--periwinkle)', accentHex:'#A2B1FB'},
];

/* ═══════════════════════════════════════════
   VARIANT A — Dark cards (homepage vc-card style)
   Fixed-height dark top panel with radial glow
   matching the brand accent color
═══════════════════════════════════════════ */
function MetricsA(){
  const{isSm,isMd}=useBreakpoint();
  const cols=isSm?'1fr':isMd?'repeat(2,1fr)':'repeat(5,1fr)';
  return(
    <section style={{background:'var(--paper)',padding:isSm?'56px 20px':'80px 40px'}}>
      <div style={{maxWidth:1280,margin:'0 auto'}}>
        <div style={{textAlign:'center',marginBottom:isSm?36:56}}>
          <span style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:12,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--violet)'}}>By the numbers</span>
          <h2 style={{fontSize:isSm?28:isMd?36:44,letterSpacing:'-0.025em',marginTop:12,color:'var(--ink)'}}>Built for scale. Priced for trust.</h2>
        </div>
        <div style={{display:'grid',gridTemplateColumns:cols,gap:isSm?12:16}}>
          {STATS.map((s,i)=>(
            <div key={i} style={{borderRadius:'var(--radius-xl)',overflow:'hidden',border:'1px solid var(--line)',background:'#fff',display:'flex',flexDirection:'column',transition:'transform .2s,box-shadow .2s',cursor:'default'}}
              onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-4px)';e.currentTarget.style.boxShadow='var(--shadow-lg)';}}
              onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='none';}}>
              {/* Dark top panel — fixed height so all cards align */}
              <div style={{position:'relative',background:'linear-gradient(145deg,#0a0820 0%,#161259 100%)',padding:'28px 24px 24px',overflow:'hidden',height:180,display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
                {/* Radial glow matching accent */}
                <div style={{position:'absolute',width:220,height:220,borderRadius:'50%',top:-80,right:-60,background:`radial-gradient(circle,${s.accentHex}55,transparent 65%)`,pointerEvents:'none'}}/>
                <div style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',color:'rgba(255,255,255,0.45)',position:'relative'}}>{s.eyebrow}</div>
                <div style={{display:'flex',alignItems:'baseline',gap:4,position:'relative'}}>
                  <span style={{fontFamily:'var(--ff-d)',fontWeight:800,fontSize:isSm?52:44,letterSpacing:'-0.04em',color:s.accent,lineHeight:0.9}}>{s.n}</span>
                  {s.sub&&<span style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:isSm?22:16,color:s.accent,opacity:0.7}}>{s.sub}</span>}
                </div>
              </div>
              {/* Light body */}
              <div style={{padding:'18px 24px 22px',background:'#fff',flex:1}}>
                <p style={{fontSize:13,lineHeight:1.55,color:'var(--slate-3)'}}>{s.body}</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ═══════════════════════════════════════════
   VARIANT B — Pillar cards
   Styled after the testimonial/partnership pillars
   from homepage-alt2: light paper bg, accent top
   stripe, number badge, big stat, descriptor text
═══════════════════════════════════════════ */
function MetricsB(){
  const{isSm,isMd}=useBreakpoint();
  const cols=isSm?'1fr':isMd?'repeat(2,1fr)':'repeat(5,1fr)';
  return(
    <section style={{background:'#fff',padding:isSm?'56px 20px':'80px 40px'}}>
      <div style={{maxWidth:1280,margin:'0 auto'}}>
        <div style={{marginBottom:isSm?36:56}}>
          <span style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:12,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--violet)'}}>By the numbers</span>
          <h2 style={{fontSize:isSm?28:isMd?36:44,letterSpacing:'-0.025em',marginTop:12,color:'var(--ink)'}}>Built for scale. Priced for trust.</h2>
        </div>
        <div style={{display:'grid',gridTemplateColumns:cols,gap:2,background:'var(--line)',borderRadius:20,overflow:'hidden'}}>
          {STATS.map((s,i)=>(
            <div key={i} style={{background:'var(--paper)',padding:isSm?'28px 20px 32px':'36px 28px 40px',display:'flex',flexDirection:'column',transition:'background .2s',cursor:'default'}}
              onMouseEnter={e=>e.currentTarget.style.background='#fff'}
              onMouseLeave={e=>e.currentTarget.style.background='var(--paper)'}>
              {/* Accent top stripe — matches tc-pillar pattern */}
              <div style={{height:3,borderRadius:999,background:s.accent,marginBottom:24,flexShrink:0}}/>
              <div style={{fontFamily:'var(--ff-d)',fontWeight:800,fontSize:11,color:'var(--slate-5)',letterSpacing:'0.08em',marginBottom:16}}>{String(i+1).padStart(2,'0')}</div>
              <div style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--slate-5)',marginBottom:12}}>{s.eyebrow}</div>
              <div style={{display:'flex',alignItems:'baseline',gap:4,marginBottom:16,flex:1,alignSelf:'flex-end',width:'100%'}}>
                <span style={{fontFamily:'var(--ff-d)',fontWeight:800,fontSize:isSm?52:isMd?44:52,letterSpacing:'-0.04em',color:'var(--ink)',lineHeight:0.9}}>{s.n}</span>
                {s.sub&&<span style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:isSm?22:18,color:s.accent}}>{s.sub}</span>}
              </div>
              <p style={{fontSize:13,lineHeight:1.55,color:'var(--slate-4)',borderTop:'1px solid var(--line-2)',paddingTop:16,marginTop:'auto'}}>{s.body}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ═══════════════════════════════════════════
   VARIANT C — Vertical stat stack
   Dark section, each stat as a full-width row
   with the number large on the left and descriptor
   on the right. Accent left-border rule per row.
   No timeline, no hover — clean and legible.
═══════════════════════════════════════════ */
function MetricsC(){
  const{isSm,isMd}=useBreakpoint();
  return(
    <section style={{background:'linear-gradient(180deg,#0C0A30 0%,#1A1352 100%)',padding:isSm?'56px 20px':'80px 40px',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,pointerEvents:'none',background:'radial-gradient(60% 50% at 80% 20%,rgba(113,1,255,0.22),transparent 70%),radial-gradient(40% 40% at 5% 80%,rgba(109,216,252,0.10),transparent 70%)'}}/>
      <div style={{maxWidth:1280,margin:'0 auto',position:'relative'}}>
        <div style={{display:'flex',flexDirection:isSm?'column':'row',alignItems:isSm?'flex-start':'flex-end',justifyContent:'space-between',gap:isSm?12:0,marginBottom:isSm?40:64}}>
          <div>
            <span style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:12,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--amber)',display:'block',marginBottom:14}}>By the numbers</span>
            <h2 style={{fontSize:isSm?28:isMd?36:44,letterSpacing:'-0.025em',color:'#fff'}}>Built for scale.<br/>Priced for trust.</h2>
          </div>
          {!isSm&&<p style={{fontSize:16,color:'rgba(255,255,255,0.5)',maxWidth:340,lineHeight:1.55,paddingBottom:4}}>The numbers behind every commitment Archera manages — and the guarantee that comes with it.</p>}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:0}}>
          {STATS.map((s,i)=>(
            <div key={i} style={{display:'grid',gridTemplateColumns:isSm?'auto 1fr':'auto 1fr auto',gap:isSm?'0 24px':'0 48px',alignItems:'center',padding:isSm?'24px 0':'28px 0',borderTop:i===0?'1px solid rgba(255,255,255,0.08)':'none',borderBottom:'1px solid rgba(255,255,255,0.08)',borderLeft:`3px solid ${s.accent}`,paddingLeft:isSm?20:28}}>
              {/* Big number */}
              <div style={{display:'flex',alignItems:'baseline',gap:4,minWidth:isSm?120:160}}>
                <span style={{fontFamily:'var(--ff-d)',fontWeight:800,fontSize:isSm?44:isMd?52:68,letterSpacing:'-0.04em',color:'#fff',lineHeight:1}}>{s.n}</span>
                {s.sub&&<span style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:isSm?18:24,color:s.accent}}>{s.sub}</span>}
              </div>
              {/* Label + body */}
              <div>
                <div style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:isSm?9:10,letterSpacing:'0.18em',textTransform:'uppercase',color:'rgba(255,255,255,0.4)',marginBottom:4}}>{s.eyebrow}</div>
                <p style={{fontSize:isSm?13:15,lineHeight:1.5,color:'rgba(255,255,255,0.65)',maxWidth:480}}>{s.body}</p>
              </div>
              {/* Accent dot — desktop only */}
              {!isSm&&<div style={{width:8,height:8,borderRadius:'50%',background:s.accent,opacity:0.7,justifySelf:'end'}}/>}
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function App(){
  return(
    <div>
      <div className="variant-label">Variant A — Dark cards (vc-card style)</div>
      <MetricsA/>
      <div className="variant-label">Variant B — Pillar cards (tc-pillar style)</div>
      <MetricsB/>
      <div className="variant-label">Variant C — Stat rows</div>
      <MetricsC/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
