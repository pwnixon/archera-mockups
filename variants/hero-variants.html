function useBreakpoint(){
  const[w,setW]=React.useState(window.innerWidth);
  React.useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);
  return{isSm:w<640,isMd:w>=640&&w<1024,isLg:w>=1024};
}

/* ================ FLAT SWOOSH (SVG, gradient, can curve) ================
   Design:
   - Flat stroke, solid color gradient (no blur).
   - Can be straight OR curved via a cubic bezier path.
   - Gradient transitions from one brand color to another, fading at the tail.
   - Head end has a circle cap in the head color (signature: circle + swoosh trail).
   Params:
     colorA = head color (fully opaque)
     colorB = tail color (fades to transparent)
     width  = stroke width in px
     length = total length of the curve
     curve  = 0 = straight, positive = arcs up, negative = arcs down
     angle  = overall rotation
*/
function Swoosh({colorA='#7101FF', colorB='#6DD8FC', width=70, length=320, curve=60, angle=-25, style={}, driftClass='drift-a', opacity=1}){
  // Unique gradient id per instance
  const gid = React.useMemo(()=>'sw-'+Math.random().toString(36).slice(2,9),[]);
  // The path: from (0, 0) to (length, 0), with a quadratic curve control point at (length/2, -curve).
  // Positive curve => bows upward; negative => bows downward.
  const h = Math.max(width*2, Math.abs(curve)*2 + width*1.5);
  const midY = h/2;
  const headX = width/2 + 4;
  const tailX = length - width/2 - 4;
  const ctrlY = midY - curve;
  const d = `M ${headX} ${midY} Q ${(headX+tailX)/2} ${ctrlY}, ${tailX} ${midY}`;
  return (
    <div style={{
      position:'absolute',
      transform: `rotate(${angle}deg)`,
      transformOrigin:'left center',
      opacity,
      ...style
    }}>
      <div className={driftClass} style={{
        width: length,
        height: h,
        pointerEvents:'none',
      }}>
        <svg width={length} height={h} viewBox={`0 0 ${length} ${h}`} style={{overflow:'visible',display:'block'}}>
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stopColor={colorA} stopOpacity="1"/>
            <stop offset="55%" stopColor={colorB} stopOpacity="0.7"/>
            <stop offset="100%" stopColor={colorB} stopOpacity="0"/>
          </linearGradient>
        </defs>
        {/* Swoosh trail (flat stroke, fading) */}
        <path d={d} stroke={`url(#${gid})`} strokeWidth={width} strokeLinecap="round" fill="none"/>
        {/* Head circle */}
        <circle cx={headX} cy={midY} r={width/2} fill={colorA}/>
      </svg>
      </div>
    </div>
  )
}

/* ================ GIANT ARC (fig 1 — big gradient circle bleeding off top) ================
   An enormous circle, positioned mostly off-canvas, with a conic/linear gradient ring.
   Renders as a filled circle with a radial-mask "cutout" creating a thick band at its edge.
   Easiest implementation: a huge circle div with a linear gradient background,
   with a slightly smaller dark circle overlaid to create a ring-arc effect.
*/
function GiantArc({size=2400, cx='50%', cy='-85%', thickness=140,
  gradient='linear-gradient(90deg, #7101FF 0%, #8B01E8 35%, #C257E0 65%, #F89090 100%)',
  bg='#0C0A30', opacity=1, style={}}){
  const inner = size - thickness*2;
  return (
    <div style={{position:'absolute',left:cx,top:cy,width:size,height:size,borderRadius:'50%',
      transform:'translate(-50%,0)',background:gradient,opacity,pointerEvents:'none',...style}}>
      <div style={{position:'absolute',left:'50%',top:'50%',width:inner,height:inner,borderRadius:'50%',
        transform:'translate(-50%,-50%)',background:bg}}/>
    </div>
  );
}

/* ================ NESTED ARC (fig 2 — concentric arc with ball at origin) ================
   Pairs a swoosh-like arc with a solid ball sitting at one end as the origin.
   Uses SVG so the arc can curve smoothly.
*/
function NestedArc({cx=0, cy=0, radius=600, thickness=80, startAngle=200, endAngle=330,
  ballColor='#F89090', ballSize=160, ballAnchor='start',
  gradFrom='rgba(248,144,144,0)', gradTo='#9AA8D8',
  style={}, opacity=1}){
  // Render an SVG larger than the arc extents; anchor ball at the arc endpoint.
  const gid = React.useMemo(()=>'na-'+Math.random().toString(36).slice(2,9),[]);
  const pad = thickness/2 + ballSize/2 + 20;
  const w = (radius + pad)*2;
  const h = (radius + pad)*2;
  const centerX = w/2;
  const centerY = h/2;
  const toRad = a => (a*Math.PI)/180;
  const ax = centerX + radius*Math.cos(toRad(startAngle));
  const ay = centerY + radius*Math.sin(toRad(startAngle));
  const bx = centerX + radius*Math.cos(toRad(endAngle));
  const by = centerY + radius*Math.sin(toRad(endAngle));
  const largeArc = Math.abs(endAngle-startAngle) > 180 ? 1 : 0;
  const sweep = endAngle > startAngle ? 1 : 0;
  const d = `M ${ax} ${ay} A ${radius} ${radius} 0 ${largeArc} ${sweep} ${bx} ${by}`;
  const ballX = ballAnchor==='start' ? ax : bx;
  const ballY = ballAnchor==='start' ? ay : by;
  return (
    <div style={{position:'absolute',left:cx,top:cy,width:w,height:h,pointerEvents:'none',opacity,
      transform:'translate(-50%,-50%)',...style}}>
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{overflow:'visible',display:'block'}}>
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stopColor={gradFrom} stopOpacity={gradFrom.includes('rgba')?1:0}/>
            <stop offset="35%" stopColor={gradTo} stopOpacity="0.4"/>
            <stop offset="100%" stopColor={gradTo} stopOpacity="1"/>
          </linearGradient>
        </defs>
        <path d={d} stroke={`url(#${gid})`} strokeWidth={thickness} strokeLinecap="round" fill="none"/>
        <circle cx={ballX} cy={ballY} r={ballSize/2} fill={ballColor}/>
      </svg>
    </div>
  );
}

  ];
  const numSize=compact?28:44; const subSize=compact?12:18;
  const labelSize=compact?8:9.5; const bodySize=compact?11:12.5;

  if(variant==='vertical'){
    return (
      <div style={{display:'flex',flexDirection:'column',gap:32}}>
        {stats.map((s,i)=>(
          <div key={i} style={{animation:`countUp 0.8s ease-out ${0.15*i+0.4}s both`,
            paddingLeft:20,borderLeft:'2px solid rgba(255,255,255,0.12)'}}>
            <div style={{fontFamily:'var(--ff-d)',fontSize:10,fontWeight:700,letterSpacing:'0.18em',
              color:'var(--amber)',marginBottom:8}}>{s.eyebrow}</div>
            <div style={{display:'flex',alignItems:'baseline',gap:3,whiteSpace:'nowrap'}}>
              <span style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:46,letterSpacing:'-0.035em',color:'#fff',lineHeight:0.95}}>{s.n}</span>
              {s.sub && <span style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:18,color:'var(--sky)',letterSpacing:'-0.015em'}}>{s.sub}</span>}
            </div>
            <div style={{fontSize:12.5,color:'rgba(255,255,255,0.6)',marginTop:10,fontFamily:'var(--ff-b)',lineHeight:1.45,maxWidth:260}}>{s.l}</div>
          </div>

  return (
    <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:0,
      borderTop:'1px solid rgba(255,255,255,0.14)',paddingTop:pt}}>

}

/* ========== Hero copy — three versions ==========
   A: Commitments without the lock-in.  (lock-in in sky)
   B: Stop overspending. Start saving.    (strike-through red + mint green)
   C: Like insurance for your cloud spend. (insurance in sky)
*/
function HeroCopy({align='left', size='xl', copy='a'}){
  const h1Size = size==='xl'?96: size==='lg'?82:74;
  const centered = align==='center';

  const Pill = null;

  let H, P;
  if (copy==='c'){
    H = <h1 style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:h1Size,letterSpacing:'-0.045em',lineHeight:0.98,margin:0,color:'#fff'}}>
      Like <span style={{color:'var(--sky)'}}>insurance</span><br/>for your cloud spend.
    </h1>;
    P = <p style={{fontSize:20,color:'rgba(255,255,255,0.72)',marginTop:28,maxWidth: centered?580:520,lineHeight:1.55,
      marginLeft: centered?'auto':0,marginRight: centered?'auto':0,textAlign: centered?'center':'left'}}>
      Archera offers a new way to reduce unpredictable cloud costs.
      {' '}<b style={{color:'#fff',fontWeight:600}}>Confidently buy commitments</b>, and we'll cover whatever goes unused.
      We call it <b style={{color:'#fff',fontWeight:600}}>insured commitments</b>.
    </p>;
  } else if (copy==='b'){
    H = <h1 style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:h1Size,letterSpacing:'-0.045em',lineHeight:0.98,margin:0,color:'#fff'}}>
      Stop <span style={{color:'var(--peach)',textDecoration:'line-through',textDecorationThickness:'4px',textDecorationColor:'var(--peach)'}}>overspending.</span><br/>
      Start <span style={{color:'var(--mint-2)'}}>saving.</span>
    </h1>;
    P = <p style={{fontSize:20,color:'rgba(255,255,255,0.72)',marginTop:28,maxWidth: centered?600:540,lineHeight:1.55,
      marginLeft: centered?'auto':0,marginRight: centered?'auto':0,textAlign: centered?'center':'left'}}>
      Cloud commitments can save you up to 72% — if you use them. Archera insures the downside so you can
      {' '}<b style={{color:'#fff',fontWeight:600}}>commit aggressively, without the risk</b>.
    </p>;
  } else {
    H = <h1 style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:Math.round(h1Size*0.80),letterSpacing:'-0.045em',lineHeight:1,margin:0,color:'#fff',whiteSpace:'nowrap'}}>
      Commit aggressively,<br/>without the <span style={{color:'var(--sky)'}}>risk.</span>
    </h1>;
    P = <p style={{fontSize:20,color:'rgba(255,255,255,0.72)',marginTop:28,maxWidth: centered?580:520,lineHeight:1.55,
      marginLeft: centered?'auto':0,marginRight: centered?'auto':0,textAlign: centered?'center':'left'}}>
      With <b style={{color:'var(--sky)',fontWeight:600}}>Insured Commitments</b>, you lock in the savings of long-term cloud commitments
      without the downside — if you don't use it, we cover it.
    </p>;
  }

  return (
    <>
      {H}
      {P}
      <div style={{display:'flex',gap:12,marginTop:36,flexWrap:'wrap',justifyContent: centered?'center':'flex-start'}}>
        <a className="hero-btn hero-btn-p" style={{padding:'16px 28px',fontSize:16}}>Schedule your demo <span className="btn-arrow"/></a>
        <a className="hero-btn hero-btn-o" style={{padding:'16px 28px',fontSize:16}}>Start now — it's free</a>
      </div>
    </>
  )
}

/* ========== Variant B — Fig 1 mirrored: circle from RIGHT, gradient wedge LEFT ========== */
function VariantB(){

    <div style={{position:'relative',width:'100%',height:'100%',overflow:'hidden',color:'#fff',
      background:'linear-gradient(105deg, #5032AC 0%, #7148D8 18%, #8E6FE6 35%, #9B8AEB 52%, #B5A8EF 68%, #D8A8D0 85%, #E89FB4 100%)'}}>
      <div style={{position:'absolute',left:'50%',top:100,width:4200,height:4200,borderRadius:'50%',
        background:'#1A1E4D',transform:'translate(-50%, 0)',zIndex:1}}/>
      <div style={{position:'absolute',top:32,left:80,right:80,zIndex:10}}><Nav/></div>
      <div style={{position:'absolute',top:220,left:0,right:0,zIndex:5,textAlign:'center',padding:'0 40px'}}>
        <HeroCopy align="center" size="xl" copy="b"/>
      </div>
      <div style={{position:'absolute',bottom:56,left:80,right:80,zIndex:5}}>
        <HeroTrustStrip/>
      </div>
    </div>
  )
}

/* ========== Variant C — Fig 1 sunrise: circle from BOTTOM, gradient wedge on TOP ========== */
function VariantC(){
  return (
    <div style={{position:'relative',width:'100%',height:'100%',overflow:'hidden',color:'#fff',
      background:'linear-gradient(105deg, #E89A9A 0%, #D766B5 20%, #C258C6 40%, #A542DD 60%, #8B3DEF 80%, #6B4CFF 100%)'}}>
      <div style={{position:'absolute',left:'50%',top:100,width:4200,height:4200,borderRadius:'50%',
        background:'#0C0A30',transform:'translate(-50%, 0)',zIndex:1}}/>
      <div style={{position:'absolute',top:32,left:80,right:80,zIndex:10}}><Nav/></div>
      <div style={{position:'absolute',top:220,left:0,right:0,zIndex:5,textAlign:'center',padding:'0 40px'}}>
        <HeroCopy align="center" size="xl" copy="c"/>
      </div>
      <div style={{position:'absolute',bottom:56,left:80,right:80,zIndex:5}}>
        <HeroTrustStrip/>
      </div>
    </div>
  )
}

/* ========== Variant D — Variant A with responsive metrics ========== */
function VariantD(){
  const{isSm,isMd,isLg}=useBreakpoint();
  const h1Size=isSm?38:isMd?58:77;
  const hPad=isSm?'0 20px':isMd?'0 40px':'0 80px';
  const circleLeft=isLg?200:isMd?'32%':'50%';
  const circleW=isLg?3200:isMd?3200:2400;
  const circleTop=isSm?60:isMd?80:100;
  const statsMini=[
    {n:'$4B',sub:'/yr',eyebrow:'UNDER MGMT'},
    {n:'$0',sub:'',eyebrow:'PLATFORM FEE'},
    {n:'SOC 2',sub:'II',eyebrow:'CERTIFIED'},
    {n:'30',sub:'-day',eyebrow:'MIN TERM'},
    {n:'20–30',sub:'%',eyebrow:'COST REDUCTION'},
  ];
  return(
    <div style={{position:'relative',width:'100%',height:'100%',overflow:'hidden',color:'#fff',
      background:'linear-gradient(90deg,#6B4CFF 0%,#8B3DEF 22%,#A542DD 45%,#C258C6 70%,#DC7AA8 88%,#E89A9A 100%)',
      display:'flex',flexDirection:'column'}}>
      <div style={{position:'absolute',left:circleLeft,top:circleTop,width:circleW,height:circleW,borderRadius:'50%',
        background:'#0C0A30',transform:'translate(-50%,0)',zIndex:1}}/>
      {/* Nav */}
      <div style={{position:'absolute',top:32,left:isSm?20:isMd?40:80,right:isSm?20:isMd?40:80,zIndex:10}}><Nav/></div>
      {/* Content */}
      <div style={{position:'relative',zIndex:5,padding:hPad,flex:1,display:'flex',flexDirection:'column',
        ...(isMd?{justifyContent:'center',alignItems:'center',paddingTop:88,paddingBottom:160,textAlign:'center'}
           :isSm?{paddingTop:96,paddingBottom:32,textAlign:'center'}
               :{justifyContent:'center',paddingTop:72,paddingBottom:24})}}>
        {isLg?(
          <div style={{display:'grid',gridTemplateColumns:'1.8fr 1fr',gap:40,alignItems:'center'}}>
            <div>
              <h1 style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:h1Size,letterSpacing:'-0.045em',lineHeight:1,margin:0,color:'#fff'}}>
                Like <span style={{color:'var(--sky)'}}>insurance</span><br/>for your cloud spend.
              </h1>
              <p style={{fontSize:20,color:'rgba(255,255,255,0.72)',marginTop:28,maxWidth:520,lineHeight:1.55,textWrap:'pretty'}}>
                Archera offers a new way to reduce unpredictable cloud costs.{' '}
                <b style={{color:'#fff',fontWeight:600}}>Confidently buy commitments</b>, and we'll cover whatever goes unused.
                We call it <b style={{color:'#fff',fontWeight:600}}>insured commitments</b>.
              </p>
              <div style={{display:'flex',gap:12,marginTop:36,flexWrap:'wrap'}}>
                <a className="hero-btn hero-btn-p" style={{padding:'16px 28px',fontSize:16}}>Schedule your demo <span className="btn-arrow"/></a>
                <a className="hero-btn hero-btn-o" style={{padding:'16px 28px',fontSize:16}}>Start now — it's free</a>
              </div>
            </div>
            <div/>
          </div>
        ):(
          <>
            <h1 style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:h1Size,letterSpacing:'-0.045em',lineHeight:1,margin:0,color:'#fff'}}>
              Like <span style={{color:'var(--sky)'}}>insurance</span><br/>for your cloud spend.
            </h1>
            <p style={{fontSize:isSm?16:17,color:'rgba(255,255,255,0.72)',marginTop:isSm?16:28,maxWidth:isSm?'100%':520,lineHeight:1.55,textWrap:'pretty',margin:`${isSm?16:28}px auto 0`}}>
              Archera offers a new way to reduce unpredictable cloud costs.{' '}
              <b style={{color:'#fff',fontWeight:600}}>Confidently buy commitments</b>, and we'll cover whatever goes unused.
              We call it <b style={{color:'#fff',fontWeight:600}}>insured commitments</b>.
            </p>
            <div style={{display:'flex',gap:12,marginTop:isSm?20:36,flexWrap:'wrap',justifyContent:'center'}}>
              <a className="hero-btn hero-btn-p" style={{padding:'14px 24px',fontSize:15}}>Schedule your demo <span className="btn-arrow"/></a>
              <a className="hero-btn hero-btn-o" style={{padding:'14px 24px',fontSize:15}}>Start now — it's free</a>
            </div>
          </>
        )}
        {isSm&&(
          <div style={{marginTop:36,display:'grid',gridTemplateColumns:'1fr 1fr',gap:1,borderTop:'1px solid rgba(255,255,255,0.14)',paddingTop:24,textAlign:'left'}}>
            {statsMini.map((s,i)=>(
              <div key={i} style={{padding:'14px 12px',borderRight:i%2===0?'1px solid rgba(255,255,255,0.1)':'none',borderBottom:i<3?'1px solid rgba(255,255,255,0.1)':'none'}}>
                <div style={{fontFamily:'var(--ff-d)',fontSize:8,fontWeight:700,letterSpacing:'0.16em',color:'var(--amber)',marginBottom:6}}>{s.eyebrow}</div>
                <div style={{display:'flex',alignItems:'baseline',gap:2}}>
                  <span style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:28,letterSpacing:'-0.03em',color:'#fff',lineHeight:1}}>{s.n}</span>
                  {s.sub&&<span style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:13,color:'var(--sky)'}}>{s.sub}</span>}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
      {!isSm&&(
        isLg
          ?<div style={{position:'relative',zIndex:5,padding:'0 80px 56px'}}><HeroStatsRow/></div>
          :<div style={{position:'absolute',bottom:24,left:32,right:32,zIndex:5}}><HeroStatsRow compact={true}/></div>
      )}
    </div>
  );
}

function App(){
  const variants = [
    {id:'A', label:'Arc from bottom-left — copy on dark', el:<VariantA/>},
    {id:'B', label:'Arc centered — cool gradient', el:<VariantB/>},
    {id:'C', label:'Arc centered — warm gradient', el:<VariantC/>},
    {id:'D', label:'Variant A + responsive metrics', el:<VariantD/>},
  ];
  return (
    <div className="page-wrap">
      {variants.map(v=>(
        <div key={v.id} className="variant-shell">
          <div className="variant-tag"><span className="dot">{v.id}</span>{v.label}</div>
          <div style={{width:'100%',height:'100%'}}>{v.el}</div>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
