<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Archera — Homepage Alt 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
:root {
  --ink:#0C0A30; --ink-2:#1F202C;
  --violet:#7101FF; --violet-2:#8B01E8; --violet-soft:#F6F0FF;
  --sky:#6DD8FC; --peach:#F89090; --mint:#38D9BF; --mint-2:#20A795;
  --amber:#FFD080; --periwinkle:#A2B1FB; --crimson:#AD284B;
  --slate-1:#090A1D; --slate-2:#1F202C; --slate-3:#444444;
  --slate-4:#686870; --slate-5:#9D9DA2;
  --line:#E2E2E5; --line-2:#F1F5F9;
  --paper:#F6F5F4; --paper-warm:#FDFCFB;
  --aws:#FF9900; --azure:#007FFF; --gcp:#34A853;
  --ff-d:"Manrope",system-ui,sans-serif;
  --ff-b:"Lexend",system-ui,sans-serif;
  --ff-display:"Manrope",system-ui,sans-serif;
  --ff-body:"Lexend",system-ui,sans-serif;
  --radius-xs:6px; --radius-sm:10px; --radius:16px; --radius-lg:24px; --radius-xl:32px;
  --shadow-sm:0 4px 14px -6px rgba(12,10,48,0.08);
  --shadow-md:0 12px 32px -12px rgba(12,10,48,0.18);
  --shadow-lg:0 32px 80px -24px rgba(12,10,48,0.28);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--ff-b);font-size:16px;line-height:1.6;color:var(--ink);background:#fff;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
h1,h2,h3,h4{font-family:var(--ff-d);font-weight:700;letter-spacing:-0.02em;margin:0;line-height:1.1;}
p{margin:0;}

/* ── Site nav ── */
#site-nav{position:fixed;top:0;left:0;right:0;z-index:1000;transition:background .3s ease;}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:72px;padding:0 40px;}
.nav-logo img{height:28px;filter:brightness(0) invert(1);display:block;}
.nav-links{display:flex;gap:26px;font-size:14px;font-family:var(--ff-d);font-weight:500;}
.nav-links a{color:rgba(255,255,255,0.8);transition:color .15s;}
.nav-links a:hover{color:#fff;}
.nav-ctas{display:flex;gap:10px;}
.nav-btn-login{display:inline-flex;align-items:center;padding:10px 18px;border-radius:999px;font-family:var(--ff-d);font-weight:600;font-size:14px;color:#fff;border:1px solid rgba(255,255,255,0.25);background:transparent;cursor:pointer;transition:all .2s;}
.nav-btn-login:hover{border-color:#fff;background:rgba(255,255,255,0.07);}
.nav-btn-start{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:999px;font-family:var(--ff-d);font-weight:600;font-size:14px;color:#fff;background:var(--violet);border:none;cursor:pointer;transition:all .2s;}
.nav-btn-start:hover{background:var(--violet-2);box-shadow:0 8px 24px -6px rgba(113,1,255,0.5);}
.nav-hamburger{display:none;background:transparent;border:none;cursor:pointer;padding:8px;color:#fff;flex-shrink:0;}
.mobile-drawer{display:none;position:fixed;top:72px;left:0;right:0;bottom:0;background:#161259;padding:32px 24px 40px;overflow-y:auto;z-index:999;flex-direction:column;}
.mobile-drawer.open{display:flex;}
.mobile-links{display:flex;flex-direction:column;gap:20px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:28px;margin-bottom:28px;}
.mobile-links a{color:rgba(255,255,255,0.85);font-family:var(--ff-d);font-size:18px;font-weight:500;}
.mobile-ctas{display:flex;flex-direction:column;gap:12px;}
.mobile-ctas .nav-btn-login,.mobile-ctas .nav-btn-start{justify-content:center;padding:14px 18px;font-size:15px;}
@media(max-width:768px){
  .nav-inner{padding:0 20px;}
  .nav-links,.nav-ctas{display:none;}
  .nav-hamburger{display:block;}
}

/* ── Hero buttons ── */
.hero-btn{display:inline-flex;align-items:center;gap:10px;padding:16px 28px;border-radius:999px;font-family:var(--ff-d);font-weight:600;font-size:16px;border:1px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none;}
.hero-btn-p{background:var(--violet);color:#fff;}
.hero-btn-p:hover{background:var(--violet-2);box-shadow:0 12px 32px -8px rgba(113,1,255,0.6);}
.hero-btn-o{background:transparent;color:#fff;border-color:rgba(255,255,255,0.25);}
.hero-btn-o:hover{border-color:#fff;background:rgba(255,255,255,0.05);}
.btn-arrow{width:18px;height:18px;border-radius:50%;background:currentColor;display:inline-grid;place-items:center;position:relative;}
.btn-arrow::after{content:"";width:6px;height:6px;border-right:2px solid var(--ink);border-top:2px solid var(--ink);transform:rotate(45deg);margin-left:-2px;}
.hero-btn-p .btn-arrow{background:#fff;}
.hero-btn-p .btn-arrow::after{border-color:var(--violet);}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Shared buttons ── */
.btn{display:inline-flex;align-items:center;gap:10px;font-family:var(--ff-d);font-weight:700;font-size:16px;padding:16px 30px;border-radius:999px;border:2px solid transparent;cursor:pointer;white-space:nowrap;transition:background .2s,border-color .2s,box-shadow .2s,transform .15s;text-decoration:none;}
.btn:hover{transform:translateY(-1px);}
.btn-violet{background:var(--violet);color:#fff;border-color:var(--violet);}
.btn-violet:hover{background:var(--violet-2);border-color:var(--violet-2);box-shadow:0 10px 28px -8px rgba(113,1,255,0.55);}
.btn-outline-ink{background:transparent;color:var(--ink);border-color:rgba(12,10,48,0.28);}
.btn-outline-ink:hover{border-color:var(--ink);background:rgba(12,10,48,0.04);}

/* ── DeRisk section shared ── */
.providers-section{padding:120px 0;position:relative;}
.providers-section .container{max-width:1240px;margin:0 auto;padding:0 32px;}
.compare-kicker{font-family:var(--ff-display);font-weight:700;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:var(--violet);display:inline-block;margin-bottom:20px;}
.pill{font-family:var(--ff-display);font-size:12px;font-weight:600;padding:6px 10px;border-radius:999px;background:var(--paper);color:var(--slate-3);white-space:nowrap;}
.pill-beta{background:var(--amber);color:var(--ink);}
.link-arrow{font-family:var(--ff-display);font-weight:600;font-size:14px;display:inline-flex;gap:6px;align-items:center;color:var(--slate-3);}

/* ── DeRisk Variant D (light tabbed) ── */
.providers-section.vD{background:var(--paper);}
.vD .provider-head{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:end;margin-bottom:56px;}
.vD .provider-head p{color:var(--slate-3);font-size:17px;max-width:480px;}
.vD h2{font-size:clamp(32px,3.6vw,48px);letter-spacing:-0.025em;}
.vD .shell{display:grid;grid-template-columns:320px 1fr;gap:32px;}
.vD .tabs{display:flex;flex-direction:column;gap:8px;}
.vD .tab{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:var(--radius-sm);background:transparent;border:1px solid transparent;cursor:pointer;text-align:left;font-family:var(--ff-b);width:100%;transition:background .15s,border-color .15s;}
.vD .tab[aria-selected="true"]{background:#fff;border-color:var(--line);box-shadow:0 2px 8px rgba(12,10,48,0.07);}
.vD .tab .logo{width:40px;height:40px;border-radius:var(--radius-xs);display:grid;place-items:center;background:var(--line);flex-shrink:0;transition:background .15s;overflow:hidden;}
.vD .tab[aria-selected="true"] .logo{background:var(--paper);}
.vD .tab .logo img{max-width:28px;max-height:26px;width:auto;height:auto;object-fit:contain;}
.vD .tab[data-cloud="aws"] .logo img{max-height:22px;}
.vD .tab[data-cloud="azure"] .logo img{max-width:32px;max-height:28px;}
.vD .tab[data-cloud="gcp"] .logo img{max-width:36px;max-height:24px;}
.vD .tab .title{font-family:var(--ff-display);font-weight:700;font-size:16px;letter-spacing:-0.01em;}
.vD .tab .sub{font-size:12px;color:var(--slate-4);margin-top:2px;}
.vD .tab .pill{font-size:10px;padding:4px 8px;}
.vD .tab[aria-selected="true"][data-cloud="gcp"] .pill.beta{background:var(--gcp);color:#fff;}
.vD .panel{background:#fff;color:var(--ink);border-radius:18px;padding:32px;display:grid;grid-template-columns:1fr 1fr;gap:32px;min-height:380px;border:1px solid var(--line);}
.vD .panel-info h3{font-size:26px;letter-spacing:-0.02em;margin-bottom:14px;}
.vD .panel-info p.lede{color:var(--slate-3);font-size:15px;line-height:1.55;margin-bottom:24px;}
.vD .panel-info .commit-block{border-top:1px solid var(--line);padding-top:20px;}
.vD .panel-info .commit-block .label{font-family:var(--ff-display);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--slate-5);margin-bottom:12px;}
.vD .panel-info ul{margin:0;padding:0;list-style:none;display:grid;gap:8px;margin-bottom:24px;}
.vD .panel-info li{display:grid;grid-template-columns:14px 1fr;gap:10px;font-size:14px;color:var(--slate-3);line-height:1.45;}
.vD .panel-info li::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--violet);margin-top:8px;margin-left:4px;}
.vD .panel-info li b{color:var(--ink);font-weight:600;}
.vD .viz-stack{display:flex;flex-direction:column;gap:8px;justify-content:center;}
.vD .viz-card{background:var(--ink);border-radius:14px;padding:18px 20px;color:#fff;position:relative;}
.vD .viz-card .tag{position:absolute;top:-10px;left:18px;padding:6px 10px;border-radius:6px;font-family:var(--ff-display);font-weight:700;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink);}
.vD .viz-card.before .tag{background:var(--peach);}
.vD .viz-card.after .tag{background:var(--mint);}
.vD .viz-card .val{font-family:var(--ff-display);font-weight:700;font-size:22px;letter-spacing:-0.01em;margin:6px 0 12px;}
.vD .viz-card .sub{font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px;}
.vD .viz-bars{display:flex;align-items:flex-end;gap:6px;height:52px;}
.vD .viz-bars .b{flex:1;border-radius:4px;}
.vD .viz-card.before .b{background:var(--peach);opacity:0.9;}
.vD .viz-card.before .b:nth-child(even){background:var(--amber);}
#vD-panel .viz-card.after .b{background:var(--aws);}
#vD-panel[data-cloud="azure"] .viz-card.after .b{background:var(--azure);}
#vD-panel[data-cloud="gcp"] .viz-card.after .b{background:var(--gcp);}
.vD .viz-card.after .b:nth-child(even){opacity:0.8;}
.vD .savings-bridge{display:flex;justify-content:center;align-items:center;position:relative;z-index:2;margin:-2px 0;}
.vD .savings-pct{background:var(--violet);color:#fff;font-family:var(--ff-display);font-size:12px;font-weight:800;padding:5px 14px;border-radius:999px;box-shadow:0 4px 14px rgba(12,10,48,0.12);letter-spacing:0.02em;}
.vD .arrow-link{color:var(--violet);font-family:var(--ff-display);font-weight:600;font-size:14px;display:inline-flex;gap:6px;align-items:center;}
@media(max-width:960px){.vD .shell{grid-template-columns:1fr;}.vD .panel{grid-template-columns:1fr;}.vD .provider-head{grid-template-columns:1fr;gap:16px;}}

/* ── Practitioner Variant D (prefixed .cp-d) ── */
.cp-d{background:radial-gradient(ellipse 900px 640px at 8% 130%,rgba(248,144,144,0.20) 0%,transparent 62%),radial-gradient(ellipse 680px 500px at 96% -10%,rgba(162,177,251,0.11) 0%,transparent 58%),linear-gradient(148deg,#100d28 0%,#1d0e3a 45%,#1a0c2e 100%);padding:80px 100px;position:relative;overflow:hidden;}
.cp-d-head{display:grid;grid-template-columns:1fr auto;gap:48px;align-items:end;margin-bottom:64px;}
.cp-d-kicker{font-family:var(--ff-d);font-weight:700;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;color:var(--peach);margin-bottom:16px;}
.cp-d h2{font-size:clamp(32px,3.2vw,46px);color:#fff;max-width:640px;}
.cp-d-head-sub{font-size:16px;line-height:1.55;color:rgba(255,255,255,0.55);max-width:320px;text-align:right;padding-bottom:4px;}
.cp-d-pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:rgba(255,255,255,0.85);border-radius:20px;overflow:hidden;}
.cp-d-pillar{background:var(--paper);padding:40px 36px 44px;display:flex;flex-direction:column;gap:0;transition:background .2s;}
.cp-d-pillar:hover{background:#fff;}
.cp-d-pillar-num{font-family:var(--ff-d);font-weight:800;font-size:13px;color:var(--slate-5);letter-spacing:0.08em;margin-bottom:20px;}
.cp-d-pillar-label{font-family:var(--ff-d);font-weight:700;font-size:20px;color:var(--ink);margin-bottom:10px;}
.cp-d-pillar-desc{font-size:14px;line-height:1.6;color:var(--slate-4);margin-bottom:36px;flex:1;}
.cp-d-pillar-badges{display:flex;align-items:center;flex-wrap:wrap;gap:14px;}
.cp-d-pillar-badges img{height:64px;width:auto;object-fit:contain;opacity:0.9;transition:opacity .2s,transform .2s;}
.cp-d-pillar-badges img:hover{opacity:1;transform:scale(1.04);}
.cp-d-pillar::before{content:"";display:block;height:3px;border-radius:999px;margin-bottom:28px;}
.cp-d-pillar:nth-child(1)::before{background:#FF492C;}
.cp-d-pillar:nth-child(2)::before{background:var(--violet);}
.cp-d-pillar:nth-child(3)::before{background:var(--mint-2);}
img[alt="Microsoft Partner"]{max-height:40px!important;}
img[alt="FinOps FOCUS"],img[alt="FinOps Focus"]{height:80px!important;}

/* ── Schedule Demo Variant C (prefixed .sd-c) ── */
.sd-c{display:grid;grid-template-columns:56% 44%;height:640px;overflow:hidden;}
.sd-c-left{position:relative;overflow:hidden;background:linear-gradient(148deg,#6B4CFF 0%,#A542DD 35%,#C258C6 60%,#D766B5 82%,#E89A9A 100%);display:flex;flex-direction:column;justify-content:center;padding:72px 80px;}
.sd-c-left::before{content:"";position:absolute;top:-30%;right:-25%;width:800px;height:800px;border-radius:50%;background:rgba(12,10,48,0.22);pointer-events:none;}
.sd-c-left::after{content:"";position:absolute;bottom:-60%;left:-20%;width:600px;height:600px;border-radius:50%;background:rgba(255,255,255,0.07);pointer-events:none;}
.sd-c-left-content{position:relative;z-index:2;}
.sd-c-kicker{font-family:var(--ff-d);font-weight:700;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-bottom:18px;}
.sd-c h2{font-size:clamp(38px,3.8vw,56px);color:#fff;max-width:480px;text-wrap:balance;}
.sd-c .body{margin-top:18px;font-size:17px;line-height:1.58;color:rgba(255,255,255,0.72);max-width:400px;text-wrap:pretty;}
.sd-c-right{background:#fff;display:flex;flex-direction:column;justify-content:center;padding:72px 68px 72px 60px;}
.sd-c-right-eyebrow{font-family:var(--ff-d);font-size:22px;font-weight:700;letter-spacing:-0.015em;color:var(--ink);margin-bottom:28px;line-height:1.2;}
.sd-c-cta-stack{display:flex;flex-direction:column;gap:12px;}
.sd-c-cta-stack .btn{justify-content:center;}
.sd-c-divider{display:flex;align-items:center;gap:12px;margin:22px 0;font-family:var(--ff-d);font-size:12px;color:var(--slate-5);font-weight:500;}
.sd-c-divider::before,.sd-c-divider::after{content:"";flex:1;height:1px;background:var(--line);}
.sd-c-checklist{display:flex;flex-direction:column;gap:16px;margin-top:4px;}
.sd-c-check-item{display:flex;align-items:flex-start;gap:14px;font-family:var(--ff-d);font-size:16px;color:var(--slate-3);line-height:1.4;}
.sd-c-check-icon{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--violet-soft);color:var(--violet);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;margin-top:1px;}

/* ── Footer ── */
.site-footer{background:var(--slate-1);color:rgba(255,255,255,0.75);padding:72px 0 36px;font-size:14px;font-family:var(--ff-body);}
.site-footer .container{max-width:1200px;margin:0 auto;padding:0 40px;}
.foot-top{display:grid;grid-template-columns:2fr 1fr 1fr;gap:64px;padding-bottom:48px;border-bottom:1px solid rgba(255,255,255,0.08);}
.foot-brand .foot-logo{display:block;margin-bottom:20px;}
.foot-brand .foot-logo img{height:28px;width:auto;display:block;filter:brightness(0) invert(1);}
.foot-brand p{max-width:300px;color:rgba(255,255,255,0.50);line-height:1.7;}
.foot-soc{margin-top:28px;display:flex;gap:10px;}
.foot-soc a{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.07);display:grid;place-items:center;transition:background .15s;}
.foot-soc a:hover{background:rgba(255,255,255,0.14);}
.foot-soc img{width:22px;height:22px;filter:brightness(0) invert(1);opacity:0.7;}
.foot-soc a:hover img{opacity:1;}
.foot-col h4{font-family:var(--ff-display);font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.40);margin-bottom:20px;}
.foot-col ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:13px;}
.foot-col a{color:rgba(255,255,255,0.65);font-size:14px;}
.foot-col a:hover{color:#fff;}
.foot-cert{padding:36px 0 32px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:32px;flex-wrap:wrap;}
.foot-cert-label{font-family:var(--ff-display);font-weight:700;font-size:10px;letter-spacing:0.20em;text-transform:uppercase;color:rgba(255,255,255,0.30);padding-top:4px;flex-shrink:0;min-width:88px;}
.foot-aws-group{display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap;}
.foot-aws-group img,.foot-compliance img{height:64px;width:auto;display:block;}
.foot-cert-divider{width:1px;align-self:stretch;background:rgba(255,255,255,0.08);flex-shrink:0;}
.foot-compliance{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.foot-legal{padding-top:28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;color:rgba(255,255,255,0.35);font-size:12px;}
.foot-legal-links{display:flex;gap:0;}
.foot-legal a{color:rgba(255,255,255,0.45);margin-left:24px;transition:color .15s;}
.foot-legal a:hover{color:#fff;}
@media(max-width:900px){.foot-top{grid-template-columns:1fr 1fr;gap:40px;}.foot-brand{grid-column:1/-1;}.foot-cert-divider{display:none;}}
@media(max-width:600px){.foot-top{grid-template-columns:1fr;}.foot-cert{flex-direction:column;gap:24px;}.foot-legal{flex-direction:column;align-items:flex-start;}.foot-legal-links a:first-child{margin-left:0;}}

/* ── Practitioner D responsive ── */
@media(max-width:960px){.cp-d{padding:60px 40px;}.cp-d-pillars{grid-template-columns:1fr;}.cp-d-head{grid-template-columns:1fr;gap:16px;}.cp-d-head-sub{text-align:left;max-width:none;}}
@media(max-width:639px){.cp-d{padding:48px 20px;overflow:hidden;}}

/* ── Schedule Demo C responsive ── */
@media(max-width:768px){.sd-c{grid-template-columns:1fr;height:auto;}.sd-c-left{padding:52px 32px 44px;}.sd-c-right{padding:44px 32px 52px;}}
@media(max-width:639px){.sd-c-left{padding:48px 20px 40px;}.sd-c-right{padding:40px 20px 48px;}}

/* ── DeRisk vD responsive ── */
@media(max-width:639px){
  .vD .panel{padding:20px;min-height:auto;}
}
.vD .tabs::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="site-nav"></div>
<div id="root"></div>

<script type="text/babel">

function useBreakpoint(){
  const[w,setW]=React.useState(window.innerWidth);
  React.useEffect(()=>{
    const h=()=>setW(window.innerWidth);
    window.addEventListener('resize',h,{passive:true});
    return()=>window.removeEventListener('resize',h);
  },[]);
  return{isSm:w<640,isMd:w>=640&&w<1024,isLg:w>=1024};
}

/* ═══════════════════════════════════════════
   SITE NAV
═══════════════════════════════════════════ */

function PFVariantC(){
  const{isSm,isMd}=useBreakpoint();
  const [step,setStep]=React.useState(0);
  const [chartTop,setChartTop]=React.useState(0);
  const stepRefs=React.useRef([]);
  const narrativeRef=React.useRef(null);
  const chartColRef=React.useRef(null);

  React.useEffect(()=>{
    if(isSm) return;
    let raf=0;
    const update=()=>{
      raf=0;
      const nc=narrativeRef.current;
      const ch=chartColRef.current;
      if(!nc||!ch) return;
      const viewportMid=window.innerHeight*0.42;
      let bestIdx=0,bestDist=Infinity;
      stepRefs.current.forEach((el,i)=>{
        if(!el) return;
        const r=el.getBoundingClientRect();
        const center=r.top+r.height/2;
        const dist=Math.abs(center-viewportMid);
        if(dist<bestDist){bestDist=dist;bestIdx=i;}
      });
      setStep(bestIdx);
      const stepEl=stepRefs.current[bestIdx];
      if(stepEl){
        const ncr=nc.getBoundingClientRect();
        const sr=stepEl.getBoundingClientRect();
        const centerInContainer=(sr.top-ncr.top)+sr.height/2;
        const chartH=ch.offsetHeight;
        let y=centerInContainer-chartH/2;
        y=Math.max(0,Math.min(nc.offsetHeight-chartH,y));
        setChartTop(y);
      }
    };
    const onScroll=()=>{if(!raf) raf=requestAnimationFrame(update);};
    update();
    window.addEventListener('scroll',onScroll,{passive:true});
    window.addEventListener('resize',onScroll);
    const rObs=new ResizeObserver(onScroll);
    rObs.observe(document.body);
    return()=>{
      window.removeEventListener('scroll',onScroll);
      window.removeEventListener('resize',onScroll);
      rObs.disconnect();
    };
  },[]);

  const steps=[
    {kicker:'01 · THE STATUS QUO',title:<>Most spend isn't under commitment.</>,body:`Teams under-commit because they're afraid of the lock-in. Result: a majority of spend sits at on-demand rates, earning zero discount.`,tone:'amber'},
    {kicker:'02 · THE TRAP',title:<>Commit long-term, and usage drifts away.</>,body:`The moment you take a 1- or 3-year commitment, you own the risk. Under-use it and the savings disappear — the bill shows up anyway.`,tone:'crimson'},
    {kicker:'03 · THE FIX',title:<>We cover the downside. You commit aggressively.</>,body:`Archera sits between your workload and your commitments. Over-commit by design; if utilization slips, we pay the difference or release the term.`,tone:'violet'},

function IllusAbsorb(){
  const zeroY=200;
  const curve=[[40,130],[100,120],[160,135],[220,160],[280,185],[340,210],[365,220],[400,240],[450,260],[510,255]];
  const findCross=()=>{for(let i=0;i<curve.length-1;i++){const[xa,ya]=curve[i],[xb,yb]=curve[i+1];if((ya-zeroY)*(yb-zeroY)<0){const t=(zeroY-ya)/(yb-ya);return[xa+(xb-xa)*t,zeroY];}}return null;};
  const cross=findCross();
  const posPts=curve.filter(([x,y])=>y<=zeroY).concat([cross]);
  const negPts=[cross].concat(curve.filter(([x,y])=>y>zeroY));
  const toPath=pts=>pts.map((p,i)=>(i===0?'M':'L')+p[0]+' '+p[1]).join(' ');
  const posFill=`M ${posPts[0][0]} ${zeroY} ${posPts.map(p=>`L ${p[0]} ${p[1]}`).join(' ')} L ${posPts[posPts.length-1][0]} ${zeroY} Z`;
  const negFill=`M ${negPts[0][0]} ${zeroY} ${negPts.map(p=>`L ${p[0]} ${p[1]}`).join(' ')} L ${negPts[negPts.length-1][0]} ${zeroY} Z`;
  return(
    <svg viewBox="0 0 560 360" style={{width:'100%',display:'block'}}>
      <defs>
        <linearGradient id="ab-pos" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor="#38D9BF" stopOpacity="0.5"/><stop offset="100%" stopColor="#38D9BF" stopOpacity="0.1"/></linearGradient>
        <linearGradient id="ab-cov" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor="#38D9BF" stopOpacity="0.15"/><stop offset="100%" stopColor="#38D9BF" stopOpacity="0.55"/></linearGradient>
      </defs>
      <line x1="40" y1={zeroY} x2="520" y2={zeroY} stroke="#fff" strokeOpacity="0.35" strokeWidth="1.2" strokeDasharray="6 4"/>
      <path d={posFill} fill="url(#ab-pos)"/>
      <path d={negFill} fill="url(#ab-cov)"/>
      <path d={toPath(curve)} fill="none" stroke="#38D9BF" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {cross&&(
        <g>
          <circle cx={cross[0]} cy={cross[1]} r="8" fill="#0C0A30" stroke="#F89090" strokeWidth="2"/>
          <circle cx={cross[0]} cy={cross[1]} r="3" fill="#F89090"/>
          <rect x={cross[0]-72} y={cross[1]-68} width="144" height="26" rx="13" fill="#F89090" opacity="0.95"/>
          <text x={cross[0]} y={cross[1]-50} textAnchor="middle" fontFamily="Manrope" fontWeight="800" fontSize="11" fill="#0C0A30" letterSpacing="1">SAVINGS GO NEGATIVE</text>
        </g>
      )}
      <g transform="translate(395,258)"><rect x="-10" y="-15" width="160" height="28" rx="14" fill="#38D9BF"/><text x="72" y="5" textAnchor="middle" fontFamily="Manrope" fontWeight="800" fontSize="12" fill="#0C0A30" letterSpacing="0.5">ARCHERA COVERAGE</text></g>
    </svg>
  );
}

function HowVariantA(){
  const{isSm}=useBreakpoint();
  const [active,setActive]=React.useState(0);
  const rowRefs=React.useRef([]);

  React.useEffect(()=>{
    if(isSm) return;
    let raf=0;
    const update=()=>{
      raf=0;
      const viewportMid=window.innerHeight*0.42;
      let best=0,bestDist=Infinity;
      rowRefs.current.forEach((el,i)=>{
        if(!el) return;
        const r=el.getBoundingClientRect();
        const mid=r.top+r.height/2;
        const d=Math.abs(mid-viewportMid);
        if(d<bestDist){bestDist=d;best=i;}
      });
      setActive(best);
    };
    const onScroll=()=>{if(!raf) raf=requestAnimationFrame(update);};
    update();
    window.addEventListener('scroll',onScroll,{passive:true});
    window.addEventListener('resize',onScroll);
    const rObs=new ResizeObserver(onScroll);
    rObs.observe(document.body);
    return()=>{
      if(raf) cancelAnimationFrame(raf);
      window.removeEventListener('scroll',onScroll);
      window.removeEventListener('resize',onScroll);
      rObs.disconnect();
    };
  },[isSm]);

  if(isSm){
    const s=STEPS[active];
    const Illus=ILLUS[active];
    const accent=ACCENT_HEX[s.accent];
    return(
      <div style={{width:'100%',background:'var(--ink)'}}>

              {STEPS.map((_,i)=><div key={i} style={{width:active===i?22:8,height:8,borderRadius:999,background:active===i?ACCENT_HEX[STEPS[i].accent]:'rgba(255,255,255,0.2)',transition:'all .3s'}}/>)}
            </div>
          </div>
          <style>{`@keyframes shimmerSweep{0%{transform:translateX(-100%);opacity:0}30%{opacity:1}100%{transform:translateX(100%);opacity:0}}`}</style>
        </DarkStage>
      </div>
    );
  }

  return(
    <div style={{width:'100%',background:'var(--ink)'}}>
      <DarkStage padTop={72} padBottom={72}>
        <HowHead/>

          {STEPS.map((s,i)=>{
            const Illus=ILLUS[i];
