<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Archera — Problem/Fix Variants</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0C0A30; --ink-2:#15123F; --navy:#464867;
    --violet:#7101FF; --violet-2:#8B01E8; --violet-soft:#F6F0FF;
    --sky:#6DD8FC; --sky-soft:#EAF9FE;
    --peach:#F89090; --peach-soft:#FDE7E7;
    --mint:#38D9BF; --mint-2:#20A795;
    --amber:#FFD080;
    --periwinkle:#A2B1FB;
    --crimson:#AD284B;
    --slate-3:#444444; --slate-4:#686870; --slate-5:#9D9DA2;
    --line:#E2E2E5; --line-2:#F1F5F9;
    --paper:#F6F5F4; --paper-warm:#FDFCFB;
    --ff-d:"Manrope",system-ui,sans-serif;
    --ff-b:"Lexend",system-ui,sans-serif;
    --radius-sm:10px; --radius:16px; --radius-lg:24px; --radius-xl:36px;
    --shadow-md: 0 12px 32px -12px rgba(12,10,48,0.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:#EDECEA;color:var(--ink);font-family:var(--ff-b)}
  .page-wrap{padding:24px 24px 80px;display:flex;flex-direction:column;gap:24px}
  .variant-shell{border-radius:28px;overflow:hidden;box-shadow:0 40px 80px -40px rgba(12,10,48,0.2),0 2px 0 rgba(12,10,48,0.04);position:relative;min-height:200px}
  .variant-tag{position:absolute;top:28px;left:28px;z-index:100;display:inline-flex;align-items:center;gap:10px;padding:8px 14px 8px 8px;background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);border:1px solid rgba(12,10,48,0.08);border-radius:999px;font-family:var(--ff-d);font-size:13px;font-weight:600;color:var(--ink);box-shadow:0 4px 14px -6px rgba(12,10,48,0.08)}
  .variant-tag .dot{width:24px;height:24px;border-radius:50%;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700}
  h1,h2,h3,h4{font-family:var(--ff-d);font-weight:700;letter-spacing:-0.02em;margin:0;color:var(--ink);line-height:1.05}
  p{margin:0}

  .kicker{
    font-family:var(--ff-d);font-weight:700;font-size:13px;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--violet);display:inline-block;
  }
  .kicker.sky{color:var(--sky)}
  .kicker.amber{color:var(--amber)}

  .tag{
    display:inline-flex;align-items:center;gap:8px;padding:6px 12px;
    border-radius:999px;font-family:var(--ff-d);font-weight:600;font-size:12px;letter-spacing:0.02em;
  }
  .tag-warn{background:rgba(173,40,75,0.1);color:var(--crimson)}
  .tag-win{background:var(--violet);color:#fff}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="pf-variants.jsx"></script>
<script type="text/babel">
function App(){
  const variants = [
    {id:'A', label:'Side-by-side cards', h:1100, el:<VariantA/>},
    {id:'B', label:'Before / after reveal slider', h:1100, el:<VariantB/>},
    {id:'C', label:'Scrollytelling — chart follows text', h:1000, el:<VariantC/>},
    {id:'D', label:'Compact horizontal — timed + hover', h:1050, el:<VariantD/>},
    {id:'E', label:'Stepper tabs + auto-advance — light', el:<VariantE/>},
  ];
  return (
    <div className="page-wrap">
      {variants.map(v=>(
        <div key={v.id} className="variant-shell" style={{height:v.h}}>
          <div className="variant-tag"><span className="dot">{v.id}</span>{v.label}</div>
          <div style={{width:'100%',height:'100%'}}>{v.el}</div>
        </div>
      ))}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
