<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Archera — Homepage 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
:root {
  --ink:#0C0A30; --ink-2:#1F202C;
  --violet:#7101FF; --violet-2:#8B01E8; --violet-soft:#F6F0FF;
  --sky:#6DD8FC; --peach:#F89090; --mint:#38D9BF; --mint-2:#20A795;
  --amber:#FFD080; --periwinkle:#A2B1FB; --crimson:#AD284B;
  --slate-1:#090A1D; --slate-2:#1F202C; --slate-3:#444444;
  --slate-4:#686870; --slate-5:#9D9DA2;
  --line:#E2E2E5; --line-2:#F1F5F9;
  --paper:#F6F5F4; --paper-warm:#FDFCFB;
  --aws:#FF9900; --azure:#007FFF; --gcp:#34A853;
  --ff-d:"Manrope",system-ui,sans-serif;
  --ff-b:"Lexend",system-ui,sans-serif;
  --ff-display:"Manrope",system-ui,sans-serif;
  --ff-body:"Lexend",system-ui,sans-serif;
  --radius-xs:6px; --radius-sm:10px; --radius:16px; --radius-lg:24px; --radius-xl:32px;
  --shadow-sm:0 4px 14px -6px rgba(12,10,48,0.08);
  --shadow-md:0 12px 32px -12px rgba(12,10,48,0.18);
  --shadow-lg:0 32px 80px -24px rgba(12,10,48,0.28);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--ff-b);font-size:16px;line-height:1.6;color:var(--ink);background:#fff;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
h1,h2,h3,h4{font-family:var(--ff-d);font-weight:700;letter-spacing:-0.02em;margin:0;line-height:1.1;}
p{margin:0;}

/* ── Site nav ── */
#site-nav{position:fixed;top:0;left:0;right:0;z-index:1000;transition:background .3s ease;}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:72px;padding:0 40px;}
.nav-logo img{height:28px;filter:brightness(0) invert(1);display:block;}
.nav-links{display:flex;gap:26px;font-size:14px;font-family:var(--ff-d);font-weight:500;}
.nav-links a{color:rgba(255,255,255,0.8);transition:color .15s;}
.nav-links a:hover{color:#fff;}
.nav-ctas{display:flex;gap:10px;}
.nav-btn-login{display:inline-flex;align-items:center;padding:10px 18px;border-radius:999px;font-family:var(--ff-d);font-weight:600;font-size:14px;color:#fff;border:1px solid rgba(255,255,255,0.25);background:transparent;cursor:pointer;transition:all .2s;}
.nav-btn-login:hover{border-color:#fff;background:rgba(255,255,255,0.07);}
.nav-btn-start{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:999px;font-family:var(--ff-d);font-weight:600;font-size:14px;color:#fff;background:var(--violet);border:none;cursor:pointer;transition:all .2s;}
.nav-btn-start:hover{background:var(--violet-2);box-shadow:0 8px 24px -6px rgba(113,1,255,0.5);}
.nav-hamburger{display:none;background:transparent;border:none;cursor:pointer;padding:8px;color:#fff;flex-shrink:0;}
.mobile-drawer{display:none;position:fixed;top:72px;left:0;right:0;bottom:0;background:#161259;padding:32px 24px 40px;overflow-y:auto;z-index:999;flex-direction:column;}
.mobile-drawer.open{display:flex;}
.mobile-links{display:flex;flex-direction:column;gap:20px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:28px;margin-bottom:28px;}
.mobile-links a{color:rgba(255,255,255,0.85);font-family:var(--ff-d);font-size:18px;font-weight:500;}
.mobile-ctas{display:flex;flex-direction:column;gap:12px;}
.mobile-ctas .nav-btn-login,.mobile-ctas .nav-btn-start{justify-content:center;padding:14px 18px;font-size:15px;}
@media(max-width:768px){
  .nav-inner{padding:0 20px;}
  .nav-links,.nav-ctas{display:none;}
  .nav-hamburger{display:block;}
}

/* ── Hero btn (used inside HeroCopy) ── */
.hero-btn{display:inline-flex;align-items:center;gap:10px;padding:16px 28px;border-radius:999px;font-family:var(--ff-d);font-weight:600;font-size:16px;border:1px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none;}
.hero-btn-p{background:var(--violet);color:#fff;}
.hero-btn-p:hover{background:var(--violet-2);box-shadow:0 12px 32px -8px rgba(113,1,255,0.6);}
.hero-btn-o{background:transparent;color:#fff;border-color:rgba(255,255,255,0.25);}
.hero-btn-o:hover{border-color:#fff;background:rgba(255,255,255,0.05);}
.btn-arrow{width:18px;height:18px;border-radius:50%;background:currentColor;display:inline-grid;place-items:center;position:relative;}
.btn-arrow::after{content:"";width:6px;height:6px;border-right:2px solid var(--ink);border-top:2px solid var(--ink);transform:rotate(45deg);margin-left:-2px;}
.hero-btn-p .btn-arrow{background:#fff;}
.hero-btn-p .btn-arrow::after{border-color:var(--violet);}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Shared buttons (schedule demo, etc.) ── */
.btn{display:inline-flex;align-items:center;gap:10px;font-family:var(--ff-d);font-weight:700;font-size:16px;padding:16px 30px;border-radius:999px;border:2px solid transparent;cursor:pointer;white-space:nowrap;transition:background .2s,border-color .2s,box-shadow .2s,transform .15s;text-decoration:none;}
.btn:hover{transform:translateY(-1px);}
.btn-violet{background:var(--violet);color:#fff;border-color:var(--violet);}
.btn-violet:hover{background:var(--violet-2);border-color:var(--violet-2);box-shadow:0 10px 28px -8px rgba(113,1,255,0.55);}
.btn-outline-ink{background:transparent;color:var(--ink);border-color:rgba(12,10,48,0.28);}
.btn-outline-ink:hover{border-color:var(--ink);background:rgba(12,10,48,0.04);}
.trust-row{display:flex;align-items:center;gap:24px;font-family:var(--ff-d);font-size:13px;font-weight:500;}
.trust-row .item{display:inline-flex;align-items:center;gap:6px;}
.trust-row .check{font-weight:800;font-size:12px;}

/* ── Derisk section shared ── */
.providers-section{padding:120px 0;position:relative;}
.providers-section .container{max-width:1240px;margin:0 auto;padding:0 32px;}
.compare-kicker{font-family:var(--ff-display);font-weight:700;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:var(--violet);display:inline-block;margin-bottom:20px;}
.pill{font-family:var(--ff-display);font-size:12px;font-weight:600;padding:6px 10px;border-radius:999px;background:var(--paper);color:var(--slate-3);white-space:nowrap;}
.pill-beta{background:var(--amber);color:var(--ink);}
.link-arrow{font-family:var(--ff-display);font-weight:600;font-size:14px;display:inline-flex;gap:6px;align-items:center;color:var(--slate-3);}

/* ── Derisk Variant C ── */
.vC{background:var(--paper);}
.vC .provider-head{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:end;margin-bottom:56px;}
.vC .provider-head p{color:var(--slate-3);font-size:17px;max-width:480px;}
.vC h2{font-size:clamp(32px,3.6vw,48px);letter-spacing:-0.025em;}
.vC .vc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.vC .vc-card{background:#fff;border-radius:var(--radius-xl);overflow:hidden;border:1px solid var(--line);display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s;}
.vC .vc-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg);}
.vC .vc-top{position:relative;padding:28px 28px 26px;overflow:hidden;min-height:260px;display:flex;flex-direction:column;}
.vC .vc-card.vc-aws .vc-top{background:linear-gradient(145deg,#1A0B00 0%,#2C1700 100%);}
.vC .vc-card.vc-azure .vc-top{background:linear-gradient(145deg,#00071A 0%,#001133 100%);}
.vC .vc-card.vc-gcp .vc-top{background:linear-gradient(145deg,#001208 0%,#001E0D 100%);}
.vC .vc-top::before{content:"";position:absolute;width:320px;height:320px;border-radius:50%;top:-100px;right:-80px;pointer-events:none;}
.vC .vc-card.vc-aws .vc-top::before{background:radial-gradient(circle,rgba(255,153,0,0.6),transparent 65%);}
.vC .vc-card.vc-azure .vc-top::before{background:radial-gradient(circle,rgba(0,127,255,0.55),transparent 65%);}
.vC .vc-card.vc-gcp .vc-top::before{background:radial-gradient(circle,rgba(52,168,83,0.55),transparent 65%);}
.vC .vc-logo-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:auto;position:relative;}
.vC .vc-logo-row img{max-height:28px;max-width:180px;width:auto;height:auto;display:block;}
.vC .vc-card.vc-aws .vc-logo-row img{max-height:30px;}
.vC .vc-card.vc-azure .vc-logo-row img{max-height:22px;max-width:140px;}
.vC .vc-card.vc-gcp .vc-logo-row img{max-height:20px;max-width:160px;}
.vC .vc-pct{font-family:var(--ff-display);font-weight:800;font-size:80px;line-height:0.9;letter-spacing:-0.04em;margin-top:18px;position:relative;}
.vC .vc-pct-unit{font-size:52px;}
.vC .vc-card.vc-aws .vc-pct{color:var(--aws);}
.vC .vc-card.vc-azure .vc-pct{color:var(--azure);}
.vC .vc-card.vc-gcp .vc-pct{color:var(--gcp);}
.vC .vc-pct-label{font-family:var(--ff-display);font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-top:8px;margin-bottom:18px;}
.vC .vc-ba{display:flex;align-items:baseline;gap:8px;font-family:var(--ff-display);font-weight:700;position:relative;}
.vC .vc-before{font-size:15px;color:rgba(255,255,255,0.3);text-decoration:line-through;}
.vC .vc-arrow{color:rgba(255,255,255,0.3);font-size:13px;font-weight:400;}
.vC .vc-after{font-size:24px;color:#fff;}
.vC .vc-mo{font-size:12px;color:rgba(255,255,255,0.35);font-weight:500;}
.vC .vc-bar-wrap{height:4px;background:rgba(255,255,255,0.1);border-radius:999px;margin-top:16px;overflow:hidden;}
.vC .vc-bar-fill{height:100%;border-radius:999px;}
.vC .vc-card.vc-aws .vc-bar-fill{background:var(--aws);}
.vC .vc-card.vc-azure .vc-bar-fill{background:var(--azure);}
.vC .vc-card.vc-gcp .vc-bar-fill{background:var(--gcp);}
.vC .vc-body{padding:28px;display:flex;flex-direction:column;gap:18px;flex:1;}
.vC .vc-body h3{font-size:21px;letter-spacing:-0.02em;}
.vC .vc-commits .label{font-family:var(--ff-display);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--slate-5);margin-bottom:10px;}
.vC .vc-commits ul{margin:0;padding:0;list-style:none;display:grid;gap:8px;}
.vC .vc-commits li{display:grid;grid-template-columns:14px 1fr;gap:10px;font-size:14px;color:var(--slate-3);line-height:1.4;}
.vC .vc-commits li::before{content:"";width:6px;height:6px;border-radius:50%;margin-top:8px;margin-left:4px;}
.vC .vc-card.vc-aws .vc-commits li::before{background:var(--aws);}
.vC .vc-card.vc-azure .vc-commits li::before{background:var(--azure);}
.vC .vc-card.vc-gcp .vc-commits li::before{background:var(--gcp);}
.vC .vc-commits li b{color:var(--ink);font-weight:600;}
.vC .vc-foot{display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px dashed var(--line);margin-top:auto;}
.vC .vc-term{font-family:var(--ff-display);font-size:12px;color:var(--slate-5);}
.vC .vc-card.vc-aws .link-arrow{color:var(--aws);}
.vC .vc-card.vc-azure .link-arrow{color:var(--azure);}
.vC .vc-card.vc-gcp .link-arrow{color:var(--gcp);}
@media(max-width:960px){.vC .vc-grid{grid-template-columns:1fr;}.vC .provider-head{grid-template-columns:1fr;gap:16px;}}
@media(min-width:640px) and (max-width:960px){
  .vC .vc-card{flex-direction:row;}
  .vC .vc-top{width:220px;flex-shrink:0;min-height:0;padding:24px 22px;}
  .vC .vc-pct{font-size:62px;margin-top:14px;}
  .vC .vc-pct-unit{font-size:40px;}
  .vC .vc-body{flex:1;}
}

/* ── Practitioner Variant A (prefixed .cp-a) ── */
.cp-a{background:var(--paper-warm);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:80px 100px;display:grid;grid-template-columns:1fr 1px 1fr;gap:72px;align-items:center;}
.cp-a-score-side{display:flex;flex-direction:column;gap:28px;}
.cp-a-stars{display:flex;align-items:center;gap:6px;}
.cp-a-star{width:28px;height:28px;background:#FF492C;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);}
.cp-a-score-num{font-family:var(--ff-d);font-weight:800;font-size:52px;letter-spacing:-0.04em;color:var(--ink);line-height:1;}
.cp-a-score-label{font-family:var(--ff-d);font-size:13px;font-weight:600;color:var(--slate-4);letter-spacing:0.06em;text-transform:uppercase;margin-top:-4px;}
.cp-a-review-cards{display:flex;flex-direction:column;gap:14px;}
.cp-a-review-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:8px;}
.cp-a-review-mini-stars{display:flex;gap:3px;}
.cp-a-review-mini-star{width:12px;height:12px;background:#FF492C;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);}
.cp-a-review-text{font-size:14px;line-height:1.5;color:var(--slate-3);font-style:italic;}
.cp-a-review-who{font-family:var(--ff-d);font-size:12px;font-weight:600;color:var(--slate-5);letter-spacing:0.04em;}
.cp-a-g2-badges{display:flex;gap:14px;align-items:center;margin-top:6px;}
.cp-a-g2-badges img{height:80px;width:auto;object-fit:contain;}
.cp-a-divider{background:var(--line);align-self:stretch;}
.cp-a-creds-side{display:flex;flex-direction:column;gap:32px;}
.cp-a-creds-head h3{font-size:28px;color:var(--ink);}
.cp-a-creds-head p{margin-top:10px;font-size:15px;line-height:1.55;color:var(--slate-4);max-width:360px;}
.cp-a-badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.cp-a-badge-slot{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;transition:box-shadow .2s,transform .2s;}
.cp-a-badge-slot:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.cp-a-badge-slot img{height:56px;width:auto;object-fit:contain;}
.cp-a-badge-slot span{font-family:var(--ff-d);font-size:11px;font-weight:600;color:var(--slate-5);text-align:center;letter-spacing:0.04em;text-transform:uppercase;}
img[alt="Microsoft Partner"]{max-height:40px!important;}
img[alt="FinOps FOCUS"]{height:80px!important;}
@media(max-width:900px){.cp-a{grid-template-columns:1fr;padding:60px 40px;}.cp-a-divider{display:none;}}

/* ── Schedule Demo Variant A (prefixed .sd-a) ── */
.sd-a{position:relative;height:640px;overflow:hidden;background:linear-gradient(105deg,#E89A9A 0%,#D766B5 20%,#C258C6 40%,#A542DD 60%,#8B3DEF 80%,#6B4CFF 100%);}
.sd-a-arc{position:absolute;left:50%;top:88px;width:4200px;height:4200px;border-radius:50%;background:#fff;transform:translateX(-50%);pointer-events:none;}
.sd-a-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;padding:164px 80px 0;}
.sd-a-kicker{font-family:var(--ff-d);font-weight:700;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;color:var(--violet);margin-bottom:18px;}
.sd-a h2{font-size:clamp(44px,4.5vw,64px);color:var(--ink);max-width:800px;text-wrap:balance;}
.sd-a .body{margin-top:20px;font-size:18px;line-height:1.58;color:var(--slate-3);max-width:500px;text-wrap:pretty;}
.sd-a .ctas{margin-top:40px;display:flex;gap:14px;align-items:center;}
.sd-a .trust-row{margin-top:28px;color:var(--slate-4);}
.sd-a .trust-row .check{color:var(--violet);}

/* ── Footer ── */
.site-footer{background:var(--slate-1);color:rgba(255,255,255,0.75);padding:72px 0 36px;font-size:14px;font-family:var(--ff-body);}
.site-footer .container{max-width:1200px;margin:0 auto;padding:0 40px;}
.foot-top{display:grid;grid-template-columns:2fr 1fr 1fr;gap:64px;padding-bottom:48px;border-bottom:1px solid rgba(255,255,255,0.08);}
.foot-brand .foot-logo{display:block;margin-bottom:20px;}
.foot-brand .foot-logo img{height:28px;width:auto;display:block;filter:brightness(0) invert(1);}
.foot-brand p{max-width:300px;color:rgba(255,255,255,0.50);line-height:1.7;}
.foot-soc{margin-top:28px;display:flex;gap:10px;}
.foot-soc a{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.07);display:grid;place-items:center;transition:background .15s;}
.foot-soc a:hover{background:rgba(255,255,255,0.14);}
.foot-soc img{width:22px;height:22px;filter:brightness(0) invert(1);opacity:0.7;}
.foot-soc a:hover img{opacity:1;}
.foot-col h4{font-family:var(--ff-display);font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.40);margin-bottom:20px;}
.foot-col ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:13px;}
.foot-col a{color:rgba(255,255,255,0.65);font-size:14px;}
.foot-col a:hover{color:#fff;}
.foot-cert{padding:36px 0 32px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:32px;flex-wrap:wrap;}
.foot-cert-label{font-family:var(--ff-display);font-weight:700;font-size:10px;letter-spacing:0.20em;text-transform:uppercase;color:rgba(255,255,255,0.30);padding-top:4px;flex-shrink:0;min-width:88px;}
.foot-aws-group{display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap;}
.foot-aws-group img,.foot-compliance img{height:64px;width:auto;display:block;}
.foot-cert-divider{width:1px;align-self:stretch;background:rgba(255,255,255,0.08);flex-shrink:0;}
.foot-compliance{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.foot-legal{padding-top:28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;color:rgba(255,255,255,0.35);font-size:12px;}
.foot-legal-links{display:flex;gap:0;}
.foot-legal a{color:rgba(255,255,255,0.45);margin-left:24px;transition:color .15s;}
.foot-legal a:hover{color:#fff;}
@media(max-width:900px){.foot-top{grid-template-columns:1fr 1fr;gap:40px;}.foot-brand{grid-column:1/-1;}.foot-cert-divider{display:none;}}
@media(max-width:600px){.foot-top{grid-template-columns:1fr;}.foot-cert{flex-direction:column;gap:24px;}.foot-legal{flex-direction:column;align-items:flex-start;}.foot-legal-links a:first-child{margin-left:0;}}

/* ── Responsive: tablet + mobile overrides ── */
@media(max-width:639px){
  .hero-btn{font-size:14px;padding:13px 20px;}
  .btn{font-size:14px;padding:13px 22px;}
  .providers-section{padding:56px 0;}
  .providers-section .container{padding:0 20px;}
  /* Derisk: shrink big stat numbers */
  .vC .vc-pct{font-size:44px;}
  .vC .vc-pct-unit{font-size:28px;}
  .vC .vc-top{min-height:200px;}
  /* Practitioner: prevent overflow */
  .cp-a{padding:48px 20px;overflow:hidden;}
  .cp-a-badge-grid{grid-template-columns:repeat(2,1fr)!important;}
  .cp-a-g2-badges{flex-wrap:wrap;gap:10px;}
  .cp-a-g2-badges img{height:56px!important;}
  .cp-a-score-num{font-size:40px!important;}
  /* Schedule demo */
  .sd-a{height:auto;}
  .sd-a-arc{top:52px;width:1200px;height:1200px;}
  .sd-a-inner{padding:80px 24px 56px;}
  .sd-a h2{font-size:clamp(30px,8vw,42px)!important;}
  .sd-a .body{font-size:16px!important;}
  .sd-a .ctas{flex-direction:column;align-items:stretch;}
  .sd-a .ctas .btn{justify-content:center;}

/* ── Breakpoint hook ── */
function useBreakpoint(){
  const[w,setW]=React.useState(window.innerWidth);
  React.useEffect(()=>{
    const h=()=>setW(window.innerWidth);
    window.addEventListener('resize',h,{passive:true});
    return()=>window.removeEventListener('resize',h);
  },[]);
  return{isSm:w<640,isMd:w>=640&&w<1024,isLg:w>=1024};
}

    window.addEventListener('scroll', h, {passive:true});

    return ()=> window.removeEventListener('scroll', h);
  },[]);
  const bg = scrolled ? '#161259' : 'transparent';
  const links = ['Products','Solutions','Pricing','Partners','Company'];

    <div style={{background: bg, transition:'background .3s ease', position:'fixed', top:0, left:0, right:0, zIndex:1000}}>

function PFSectionHead({kicker='The commitment trap',kickerTone='violet',title,body,align='left',titleSize=52,dark=false,maxWidth=860}){
  const ta=align==='center'?'center':'left';
  const mx=align==='center'?'auto':'0';

    <div style={{textAlign:ta,maxWidth,marginLeft:mx,marginRight:mx}}>

const WORKLOADS=[{name:'EC2',bg:'#FF8A3D'},{name:'RDS',bg:'#24A148'},{name:'OpenSearch',bg:'#7101FF'}];
const PAL={year3:'#FFC83D',year1:'#6DD8FC',ondemand:'#E8EAEE',insured:'#7101FF'};
const WITHOUT_STACKS=[[18,34,48],[12,28,60],[10,15,75]];
const WITH_STACKS=[[10,15,72,3],[13,12,70,5],[10,13,71,6]];
const WITHOUT_COVERED=['52%','40%','25%'];
const WITH_COVERED=['97%','95%','94%'];
const TRAP_STACKS=[[5,13,10,24,48],[3,13,7,21,56],[2,13,4,13,68]];
const TRAP_COVERED=['15%','10%','6%'];

function WorkloadIcon({name,size=28}){

  if(name==='RDS') return <span style={{...common,background:'#24A148'}}><svg width={size*0.55} height={size*0.55} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v14c0 1.66 3.58 3 8 3s8-1.34 8-3V5"/><path d="M4 12c0 1.66 3.58 3 8 3s8-1.34 8-3"/></svg></span>;
  return <span style={{...common,background:'#7101FF'}}><svg width={size*0.55} height={size*0.55} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><circle cx="10" cy="10" r="6"/><path d="M15 15l5 5"/></svg></span>;
}

function Seg({height,color,hatched,glow,wasted}){
  return(
    <div style={{height:`${height}%`,width:'100%',background:hatched?`repeating-linear-gradient(45deg,${color} 0px,${color} 4px,rgba(255,255,255,0.55) 4px,rgba(255,255,255,0.55) 8px)`:color,transition:'height .7s cubic-bezier(.4,0,.2,1)',position:'relative',boxShadow:glow&&height>5?'0 0 20px rgba(113,1,255,0.45),inset 0 0 0 1px rgba(255,255,255,0.12)':'none'}}>
      {wasted&&<div style={{position:'absolute',inset:0,display:'grid',placeItems:'center',pointerEvents:'none'}}><span style={{background:'#AD284B',border:'1px solid rgba(255,255,255,0.4)',borderRadius:3,padding:'2px 6px',fontFamily:'var(--ff-d)',fontSize:8,fontWeight:800,letterSpacing:'0.14em',color:'#fff',textTransform:'uppercase',lineHeight:1}}>UNUSED</span></div>}
    </div>

}

function ChartLegend({variant,onDark,trap}){
  const items=variant==='with'
    ?[{c:PAL.year3,l:'3-year: 57% off'},{c:PAL.year1,l:'1-year: 27% off'},{c:PAL.insured,l:'30-day commit: 30% off'}]
    :trap
      ?[{c:PAL.year3,l:'3-year (utilized)'},{c:PAL.year1,l:'1-year (utilized)'},{c:'#AD284B',l:'Committed but unused',hatched:true},{c:onDark?'rgba(255,255,255,0.2)':PAL.ondemand,l:'On-demand (new drift)'}]
      :[{c:PAL.year3,l:'3-year: 57% off'},{c:PAL.year1,l:'1-year: 27% off'},{c:onDark?'rgba(255,255,255,0.2)':PAL.ondemand,l:'On-demand: 0% off'}];
  return(
    <div style={{display:'flex',gap:20,flexWrap:'wrap',padding:'14px 22px 0',fontFamily:'var(--ff-b)',fontSize:12,color:onDark?'rgba(255,255,255,0.7)':'var(--slate-4)'}}>

        <div key={i} style={{display:'inline-flex',alignItems:'center',gap:8}}>
          <span style={{width:12,height:12,borderRadius:'50%',background:x.hatched?`repeating-linear-gradient(45deg,${x.c} 0,${x.c} 2px,rgba(255,255,255,0.6) 2px,rgba(255,255,255,0.6) 4px)`:x.c,display:'inline-block'}}/>
          {x.l}
        </div>
      ))}
    </div>
  );
}

function CoverageChart({variant='without',onDark=false,compact=false,embedded=false,trap=false}){
  const useTrap=trap&&variant!=='with';
  const stacks=variant==='with'?WITH_STACKS:(useTrap?TRAP_STACKS:WITHOUT_STACKS);
  const covered=variant==='with'?WITH_COVERED:(useTrap?TRAP_COVERED:WITHOUT_COVERED);
  const chartH=compact?130:210;
  const axisW=compact?24:38;
  const gap=compact?8:14;
  const iconSize=compact?18:28;
  const accent=variant==='with'?'var(--violet)':(useTrap?'var(--crimson)':(onDark?'#fff':'var(--ink)'));
  const gridColor=onDark?'rgba(255,255,255,0.08)':'rgba(12,10,48,0.08)';
  const axisColor=onDark?'rgba(255,255,255,0.4)':'var(--slate-5)';
  const header=(
    <div style={{padding:'18px 22px',background:variant==='with'?'var(--violet)':(onDark?'rgba(255,255,255,0.06)':'var(--paper)'),borderBottom:variant==='with'?'none':(onDark?'1px solid rgba(255,255,255,0.08)':'1px solid var(--line)'),borderRadius:variant==='with'?'var(--radius) var(--radius) 0 0':0}}>
      <div style={{fontFamily:'var(--ff-d)',fontWeight:700,fontSize:18,letterSpacing:'-0.015em',color:variant==='with'?'#fff':(onDark?'#fff':'var(--ink)')}}>{variant==='with'?'With Archera':'Without Archera'}</div>
    </div>
  );
  const content=(
    <>
      {!embedded&&header}
      {!compact&&<ChartLegend variant={variant} onDark={onDark} trap={useTrap}/>}
      <div style={{padding:compact?'10px 12px 12px':'18px 22px 22px'}}>
        <div style={{position:'relative',height:chartH,display:'grid',gridTemplateColumns:`${axisW}px 1fr 1fr 1fr`,gap,alignItems:'end'}}>
          <div style={{position:'relative',height:'100%'}}>
            {(compact?[0,50,100]:[0,25,50,75,100]).map(v=><div key={v} style={{position:'absolute',right:2,bottom:`${v}%`,transform:'translateY(50%)',fontSize:compact?8:11,color:axisColor,fontFamily:'var(--ff-d)',fontWeight:500}}>{v}%</div>)}
          </div>
          {WORKLOADS.map((w,wi)=>{
            const stack=stacks[wi];
            return(
              <div key={w.name} style={{position:'relative',height:'100%'}}>
                {(compact?[0,50,100]:[0,25,50,75,100]).map(v=><div key={v} style={{position:'absolute',left:-gap/2,right:0,bottom:`${v}%`,height:1,borderTop:`1px dashed ${gridColor}`}}/>)}
                <div style={{position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)',width:'65%',height:'100%',display:'flex',flexDirection:'column-reverse',borderRadius:'6px 6px 0 0',overflow:'hidden'}}>
                  {variant==='with'?(<><Seg height={stack[0]} color={PAL.year3}/><Seg height={stack[1]} color={PAL.year1}/><Seg height={stack[2]} color={PAL.insured} glow/><Seg height={stack[3]} color={onDark?'rgba(255,255,255,0.14)':PAL.ondemand}/></>)
                  :useTrap?(<><Seg height={stack[0]} color={PAL.year3}/><Seg height={stack[1]} color="#AD284B" hatched wasted/><Seg height={stack[2]} color={PAL.year1}/><Seg height={stack[3]} color="#AD284B" hatched wasted/><Seg height={stack[4]} color={onDark?'rgba(255,255,255,0.14)':PAL.ondemand}/></>)
                  :(<><Seg height={stack[0]} color={PAL.year3}/><Seg height={stack[1]} color={PAL.year1}/><Seg height={stack[2]} color={onDark?'rgba(255,255,255,0.14)':PAL.ondemand}/></>)}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{display:'grid',gridTemplateColumns:`${axisW}px 1fr 1fr 1fr`,gap,marginTop:compact?8:18}}>
          <div/>
          {WORKLOADS.map((w,wi)=>(
            <div key={w.name} style={{textAlign:'center'}}>
              <div style={{display:'inline-flex',alignItems:'center',gap:compact?4:8,fontFamily:'var(--ff-d)',fontWeight:600,fontSize:compact?10:14,color:onDark?'#fff':'var(--ink)',letterSpacing:'-0.01em'}}>
                <WorkloadIcon name={w.name} size={iconSize}/>{w.name}
              </div>
              <div style={{marginTop:compact?3:6,fontFamily:'var(--ff-d)',fontWeight:700,fontSize:compact?10:15,color:accent,letterSpacing:'-0.01em'}}>{covered[wi]}</div>
            </div>
          ))}
        </div>
      </div>
    </>
  );
  if(embedded) return content;
  return(
    <div style={{background:onDark?'rgba(255,255,255,0.04)':'#fff',border:onDark?'1px solid rgba(255,255,255,0.1)':'1px solid var(--line)',borderRadius:'var(--radius)',overflow:'hidden',boxShadow:onDark?'none':'0 2px 6px rgba(12,10,48,0.04)'}}>
      {content}
    </div>
  );
}

function IllusAbsorb(){
  const x0=40,zeroY=200;
  const curve=[[40,130],[100,120],[160,135],[220,160],[280,185],[340,210],[365,220],[400,240],[450,260],[510,255]];
  const findCross=()=>{for(let i=0;i<curve.length-1;i++){const[xa,ya]=curve[i],[xb,yb]=curve[i+1];if((ya-zeroY)*(yb-zeroY)<0){const t=(zeroY-ya)/(yb-ya);return[xa+(xb-xa)*t,zeroY];}}return null;};
  const cross=findCross();
  const posPts=curve.filter(([x,y])=>y<=zeroY).concat([cross]);
  const negPts=[cross].concat(curve.filter(([x,y])=>y>zeroY));
  const toPath=pts=>pts.map((p,i)=>(i===0?'M':'L')+p[0]+' '+p[1]).join(' ');
  const posFill=`M ${posPts[0][0]} ${zeroY} ${posPts.map(p=>`L ${p[0]} ${p[1]}`).join(' ')} L ${posPts[posPts.length-1][0]} ${zeroY} Z`;
  const negFill=`M ${negPts[0][0]} ${zeroY} ${negPts.map(p=>`L ${p[0]} ${p[1]}`).join(' ')} L ${negPts[negPts.length-1][0]} ${zeroY} Z`;
  return(

    </svg>
  );
